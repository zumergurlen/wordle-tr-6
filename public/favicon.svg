<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0f172a" />
      <stop offset="100%" stop-color="#111827" />
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#06b6d4" />
      <stop offset="100%" stop-color="#3b82f6" />
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2.8" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>
  <rect width="256" height="256" rx="56" fill="url(#bg)" />
  <rect x="16" y="16" width="224" height="224" rx="48" fill="none" stroke="url(#accent)" stroke-width="6" opacity="0.7" />
  <g transform="translate(8,0) skewX(-10)">
    <text
      x="128"
      y="154"
      text-anchor="middle"
      font-family="Impact, Arial Black, Inter, system-ui, sans-serif"
      font-size="118"
      font-weight="900"
      letter-spacing="-5"
      fill="#22d3ee"
      opacity="0.35"
      filter="url(#glow)"
    >
      ZG
    </text>
    <text
      x="128"
      y="154"
      text-anchor="middle"
      font-family="Impact, Arial Black, Inter, system-ui, sans-serif"
      font-size="118"
      font-weight="900"
      letter-spacing="-5"
      fill="#e2e8f0"
      stroke="#111827"
      stroke-width="1.8"
    >
      ZG
    </text>
  </g>
</svg>
