<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 180 180">
  <defs>
    <linearGradient id="borderGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1E90FF" />
      <stop offset="100%" stop-color="#00BFFF" />
    </linearGradient>
    <filter id="containerShadow" x="-40%" y="-40%" width="180%" height="200%">
      <feDropShadow dx="0" dy="6" stdDeviation="8" flood-color="rgba(0,0,0,0.6)" />
    </filter>
    <filter id="textGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="4.2" result="blur" />
      <feColorMatrix
        in="blur"
        type="matrix"
        values="0 0 0 0 0.1176 0 0 0 0 0.5647 0 0 0 0 1 0 0 0 0.6 0"
      />
    </filter>
    <filter id="textShadow" x="-50%" y="-50%" width="200%" height="200%">
      <feDropShadow dx="2" dy="4" stdDeviation="2.4" flood-color="rgba(0,0,0,0.8)" />
    </filter>
  </defs>
  <rect width="180" height="180" fill="#0A0A0A" />
  <g filter="url(#containerShadow)">
    <rect x="12" y="12" width="156" height="156" rx="24" fill="#0A0A0A" />
    <rect
      x="12"
      y="12"
      width="156"
      height="156"
      rx="24"
      fill="none"
      stroke="url(#borderGrad)"
      stroke-width="4"
      opacity="0.8"
    />
  </g>
  <text
    x="90"
    y="98"
    text-anchor="middle"
    dominant-baseline="middle"
    font-family="'Playfair Display', serif"
    font-size="52"
    font-weight="700"
    font-style="italic"
    letter-spacing="2"
    fill="#1E90FF"
    filter="url(#textGlow)"
  >
    ZG
  </text>
  <text
    x="90"
    y="98"
    text-anchor="middle"
    dominant-baseline="middle"
    font-family="'Playfair Display', serif"
    font-size="52"
    font-weight="700"
    font-style="italic"
    letter-spacing="2"
    fill="#F5F5F5"
    filter="url(#textShadow)"
  >
    ZG
  </text>
</svg>
