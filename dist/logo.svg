<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256">
  <defs>
    <filter id="containerShadow" x="-40%" y="-40%" width="180%" height="200%">
      <feDropShadow dx="0" dy="8" stdDeviation="10" flood-color="rgba(0,0,0,0.6)" />
    </filter>
    <filter id="textGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="6" result="blur" />
      <feColorMatrix
        in="blur"
        type="matrix"
        values="0 0 0 0 0.1176 0 0 0 0 0.5647 0 0 0 0 1 0 0 0 0.6 0"
      />
    </filter>
    <filter id="textShadow" x="-50%" y="-50%" width="200%" height="200%">
      <feDropShadow dx="2" dy="4" stdDeviation="3" flood-color="rgba(0,0,0,0.8)" />
    </filter>
  </defs>
  <rect width="256" height="256" fill="#0A0A0A" />
  <g filter="url(#containerShadow)">
    <rect x="16" y="16" width="224" height="224" rx="32" fill="#0A0A0A" />
  </g>
  <text
    x="128"
    y="143"
    text-anchor="middle"
    dominant-baseline="middle"
    font-family="'Playfair Display', serif"
    font-size="110"
    font-weight="700"
    font-style="italic"
    letter-spacing="2"
    fill="#1E90FF"
    filter="url(#textGlow)"
  >
    ZG
  </text>
  <text
    x="128"
    y="147"
    text-anchor="middle"
    dominant-baseline="middle"
    font-family="'Playfair Display', serif"
    font-size="110"
    font-weight="700"
    font-style="italic"
    letter-spacing="2"
    fill="#F5F5F5"
    filter="url(#textShadow)"
  >
    ZG
  </text>
</svg>
